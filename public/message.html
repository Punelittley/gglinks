<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGLINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="header_footer.css">
<style>
:root {
    --bg: #000000;
    --surface: #0a0a0a;
    --border: #151515;
    --accent: #0066ff;
    --white: #ffffff;
    --gray: #666666;
    --font-head: 'Space Grotesk', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
    --side: #050505;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    outline: none;
}
header {
    flex-shrink: 0;
    position: relative; 
}
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh; 
    overflow: hidden;
    background: var(--bg);
    color: var(--white);
}

[data-aos="reveal"] {
    opacity: 0;
    filter: blur(20px);
    transform: scale(0.99);
    transition: all 1s ease;
}
.mobile-admin-link {
    display: none !important;
    color: #ff3333 !important;
    border: 1px solid #ff3333;
    padding: 10px 30px;
    font-size: 14px !important;
}

.mobile-admin-link.visible {
    display: inline-block !important;
}

[data-aos="reveal"].aos-animate {
    opacity: 1;
    filter: blur(0);
    transform: scale(1);
}

.messenger-layout {
    flex: 1; 
    display: grid;
    grid-template-columns: 350px 1fr;
    overflow: hidden;
}
.contacts-bar {
    background: var(--side);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.contacts-header {
    padding: 25px;
    border-bottom: 1px solid var(--border);
}

.contacts-header h2 {
    font-family: var(--font-head);
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.contacts-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.contact-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
    margin-bottom: 5px;
    border: 1px solid transparent;
}

.contact-item:hover {
    background: #0c0c0c;
}

.contact-item.active {
    background: #111;
    border-color: var(--border);
}

.avatar-sm {
    width: 45px;
    height: 45px;
    background: #000;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-weight: 700;
    position: relative;
    flex-shrink: 0;
}

.status-dot {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    background: #00ff88;
    border: 2px solid var(--side);
    border-radius: 50%;
}

.contact-info .name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
}

.contact-info .last-msg {
    font-size: 12px;
    color: var(--gray);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}

.chat-view {
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
    overflow: hidden;
}

.chat-header {
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.user-meta {
    display: flex;
    align-items: center;
    gap: 15px;
}

.back-btn {
    display: none;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    margin-right: 15px;
}

#view-call {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.call-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    width: 100%;
    padding: 40px;
    flex: 1;
}

.call-user-card {
    background: #080808;
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.call-controls {
    margin-bottom: 40px;
    display: flex;
    gap: 20px;
    background: #111;
    padding: 15px 30px;
    border-radius: 50px;
}

.c-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: #222;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.c-btn-hangup {
    background: #ff3333;
    width: 70px;
    border-radius: 15px;
}

.messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.message {
    max-width: 60%;
    padding: 15px 20px;
    border: 1px solid var(--border);
    line-height: 1.5;
    font-size: 14px;
    position: relative;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
    min-width: 0;
}

.message.mine {
    align-self: flex-end;
    border-color: var(--accent);
    background: rgba(0, 102, 255, 0.05);
}

.message.theirs {
    align-self: flex-start;
    background: var(--side);
}

.msg-time {
    font-size: 9px;
    color: var(--gray);
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: 800;
}

.message img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
}

audio {
    height: 30px;
    margin-top: 10px;
    filter: invert(1);
}

.input-bar {
    padding: 25px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: center;
    flex-shrink: 0;
}

.input-bar input[type="text"] {
    flex: 1;
    background: #080808;
    border: 1px solid var(--border);
    color: #fff;
    padding: 15px;
    border-radius: 4px;
    min-width: 0;
}

.icon-btn {
    color: var(--gray);
    cursor: pointer;
    font-size: 20px;
    transition: 0.3s;
}

.icon-btn:hover {
    color: var(--accent);
}

.recording {
    color: #ff3333 !important;
}

@media (max-width: 768px) {
    .messenger-layout { grid-template-columns: 1fr; }
    .chat-view { display: none; }
    .messenger-layout.chat-active .contacts-bar { display: none; }
    .messenger-layout.chat-active .chat-view { display: flex; }
    .input-bar { padding: 15px; gap: 10px; }
    .input-bar input { padding: 12px; }
    .messages-area { padding: 20px; }
    .message { max-width: 85%; }
    .back-btn { display: flex !important; }
}

@media (max-width: 440px) {
    .input-bar { padding: 10px; gap: 8px; }
    .messages-area { padding: 15px; gap: 12px; }
    .message { max-width: 90%; padding: 12px 15px; font-size: 13px; }
    .avatar-sm { width: 36px; height: 36px; }
}
</style>
</head>
<body>
<header>
    <div class="container">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <img src="assets/logo.svg" alt="GGLINK Logo">
            </a>
            <nav class="nav-menu">
                <a href="brows.html">Найти тиммейта</a>
                <a href="games.html">Библиотека игр</a>
                <a href="tournament.html">Турниры</a>
                <a href="clans.html">Кланы</a>
            </nav>
            <div class="header-actions">
                <a href="message.html" class="msg-icon" title="Сообщения" onclick="return checkMsgAuth(event)">
                    <i class="fas fa-comment-dots"></i>
                </a>
                <a href="admin.html" class="admin-link" id="admin-link"><i class="fas fa-shield-alt"></i> Админ</a>
                <a href="profile.html" class="profile-icon" id="header-profile-icon"></a>
                <span id="auth-buttons">
                    <a href="auth.html" style="color:var(--gray); text-decoration:none; font-size:12px; font-weight:600; text-transform:uppercase;">Войти</a>
                    <a href="auth.html" class="btn btn-blue" style="margin-left:10px;">Регистрация</a>
                </span>
                <button class="burger-btn" id="burger-btn" onclick="toggleMenu()">
                    <i class="fas fa-bars" id="burger-icon"></i>
                </button>
            </div>
        </div>
    </div>
</header>

<div class="mobile-menu" id="mobile-menu">
    <a href="brows.html">Найти тиммейта</a>
    <a href="games.html">Библиотека игр</a>
    <a href="tournament.html">Турниры</a>
    <a href="clans.html">Кланы</a>
    <a href="message.html">Сообщения</a>
    <a href="admin.html" class="mobile-admin-link" id="mobile-admin-link"><i class="fas fa-shield-alt"></i> Админ</a>
    <div class="mobile-auth" id="mobile-auth">
        <a href="auth.html">Войти</a>
        <a href="auth.html" class="btn btn-blue">Регистрация</a>
    </div>
</div>


    <div class="messenger-layout">
        <aside class="contacts-bar" data-aos="reveal">
            <div class="contacts-header">
                <h2>Сообщения</h2>
            </div>
            <div class="contacts-list" id="contact-list"></div>
        </aside>
        <main class="chat-view" data-aos="reveal" data-aos-delay="200">
            <div id="view-call">
                <div class="call-grid" id="call-grid">
                    <div class="call-user-card" id="call-local">
                        <div style="text-align: center;">
                            <div class="avatar-sm" style="width:100px; height:100px; font-size:40px; margin: 0 auto 15px;">U</div>
                            <div id="call-target-name">User</div>
                        </div>
                    </div>
                </div>
                <div class="call-controls">
                    <button class="c-btn"><i class="fas fa-microphone"></i></button>
                    <button class="c-btn"><i class="fas fa-video"></i></button>
                    <button class="c-btn c-btn-hangup" onclick="toggleCall(false)"><i class="fas fa-phone-slash"></i></button>
                </div>
            </div>
            <div class="chat-header">
                <div class="user-meta">
                    <button class="back-btn" onclick="backToContacts()"><i class="fas fa-arrow-left"></i> Назад</button>
                    <div class="avatar-sm" id="chat-avatar">?</div>
                    <div>
                        <div class="name" id="chat-with-name">Выберите собеседника</div>
                        <div style="font-size: 10px; color: #00ff88; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">В сети</div>
                    </div>
                </div>
                <div style="display: flex; gap: 25px;">
                    <i class="fas fa-phone-alt icon-btn" onclick="toggleCall(true)" title="Start Voice Call"></i>
                </div>
            </div>
            <div class="messages-area" id="box"></div>
            <div class="input-bar">
                <label class="icon-btn"><i class="fas fa-image"></i><input type="file" id="img-in" hidden accept="image/png, image/jpeg, image/gif, image/webp"></label>
                <i class="fas fa-microphone icon-btn" id="mic-btn" title="Hold to record voice"></i>
                <input type="text" id="msg-in" placeholder="Напишите сообщение">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; padding:12px 25px; font-weight:700; cursor:pointer; font-family:var(--font-head); font-size:12px;">Отправить</button>
            </div>
        </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        (function() {
            try {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                if (!user || !user.username) {
                    alert('Для доступа к сообщениям необходимо авторизоваться.');
                    window.location.href = 'auth.html';
                    return;
                }
            } catch(e) {
                window.location.href = 'auth.html';
            }
        })();

        AOS.init();
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('burger-icon');
            menu.classList.toggle('active');
            icon.className = menu.classList.contains('active') ? 'fas fa-times' : 'fas fa-bars';
        }
function checkAuth() {
    try {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user || !user.username) return;
        const authBtns = document.getElementById('auth-buttons');
        const profileIcon = document.getElementById('header-profile-icon');
        const adminLink = document.getElementById('admin-link');
        const mobileAdminLink = document.getElementById('mobile-admin-link');

        if (authBtns) authBtns.style.display = 'none';
        const ma = document.getElementById('mobile-auth'); if (ma) ma.style.display = 'none';
        if (profileIcon) {
            profileIcon.style.display = 'flex';
            profileIcon.innerText = user.username[0].toUpperCase();
        }
        if (user.isAdmin) {
            if (adminLink) adminLink.style.display = 'inline-block';
            if (mobileAdminLink) mobileAdminLink.classList.add('visible');
        }
    } catch(e) {}
}

        function checkMsgAuth(e) {
            try {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                if (!user || !user.username) {
                    if (e) e.preventDefault();
                    alert('Для доступа к сообщениям необходимо авторизоваться.');
                    window.location.href = 'auth.html';
                    return false;
                }
                return true;
            } catch(e) { return false; }
        }
        checkAuth();

        const socket = io();
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const myNick = currentUser ? currentUser.username : "User_" + Math.floor(Math.random() * 1000);        
        let currentTarget = null;
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                const list = document.getElementById('contact-list');
                const others = users.filter(u => u.username !== myNick);
                if (others.length === 0) {
                    list.innerHTML = '<p style="color:var(--gray); padding:20px; font-size:13px;">Пока нет пользователей.</p>';
                    return;
                }
                list.innerHTML = others.map(u => `
                    <div class="contact-item" onclick="startChatWith('${u.username}')">
                        <div class="avatar-sm">${u.username[0].toUpperCase()}<div class="status-dot"></div></div>
                        <div class="contact-info">
                            <div class="name">${u.username}</div>
                            <div class="last-msg">Нажми, чтобы открыть чат</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.log('Не удалось загрузить пользователей');
            }
        }
        loadUsers();
        const params = new URLSearchParams(window.location.search);
        const toUser = params.get('to');
        if (toUser) startChatWith(toUser);

function startChatWith(name) {
    currentTarget = name;
    document.getElementById('chat-with-name').innerText = name;
    document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
    document.getElementById('call-target-name').innerText = name;
    document.getElementById('box').innerHTML = "";
    document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
    const roomId = [myNick, name].sort().join('_');
    socket.emit('join_room', roomId);
    document.querySelector('.messenger-layout').classList.add('chat-active');
}

function backToContacts() {
    document.querySelector('.messenger-layout').classList.remove('chat-active');
}


        function appendMsg(m) {
            const b = document.getElementById('box');
            const isMine = m.sender === myNick;
            const div = document.createElement('div');
            div.className = `message ${isMine ? 'mine' : 'theirs'}`;
            
            let contentHtml = `<div style="word-wrap:break-word; overflow-wrap:break-word; word-break:break-word;">${m.content}</div>`;
            if (m.type === 'image') contentHtml = `<img src="${m.content}">`;
            if (m.type === 'voice') contentHtml = `<audio src="${m.content}" controls></audio>`;

            div.innerHTML = `
                <div class="msg-time">${m.sender} // ${new Date(m.timestamp || Date.now()).toLocaleTimeString()}</div>
                ${contentHtml}
            `;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        }

        socket.on('receive_message', (m) => {
            if (currentTarget) appendMsg(m);
        });

        socket.on('chat_history', (msgs) => {
            document.getElementById('box').innerHTML = "";
            msgs.forEach(appendMsg);
        });

        function send() {
            const i = document.getElementById('msg-in');
            if (!i.value || !currentTarget) return;
            const roomId = [myNick, currentTarget].sort().join('_');
            socket.emit('send_message', { roomId, sender: myNick, content: i.value, type: 'text' });
            i.value = "";
        }

        document.getElementById('img-in').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Проверка: только изображения
            const allowedTypes = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'image/jpg'];
            if (!allowedTypes.includes(file.type)) {
                alert('Можно отправлять только фотографии (PNG, JPG, GIF, WEBP)');
                e.target.value = '';
                return;
            }

            const reader = new FileReader();
            const roomId = [myNick, currentTarget].sort().join('_');
            reader.onload = () => socket.emit('send_message', { roomId, sender: myNick, content: reader.result, type: 'image' });
            reader.readAsDataURL(file);
            e.target.value = '';
        };

          let mediaRec = null;
        let chunks = [];
        const mic = document.getElementById('mic-btn');

        function getSupportedMimeType() {
            const types = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/mp4',
                'audio/ogg;codecs=opus',
                'audio/ogg'
            ];
            for (const t of types) {
                if (MediaRecorder.isTypeSupported(t)) return t;
            }
            return '';
        }

        async function startRecording() {
            if (!currentTarget) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
                const mimeType = getSupportedMimeType();
                const options = mimeType ? { mimeType } : {};
                mediaRec = new MediaRecorder(stream, options);
                chunks = [];

                mediaRec.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) chunks.push(e.data);
                };

                mediaRec.onstop = () => {
                    stream.getTracks().forEach(t => t.stop());
                    if (chunks.length === 0) return;
                    const blob = new Blob(chunks, { type: mediaRec.mimeType || 'audio/webm' });
                    const reader = new FileReader();
                    const roomId = [myNick, currentTarget].sort().join('_');
                    reader.onload = () => {
                        socket.emit('send_message', {
                            roomId, sender: myNick,
                            content: reader.result,
                            type: 'voice'
                        });
                    };
                    reader.readAsDataURL(blob);
                };

                mediaRec.start(1000);
                mic.classList.add('recording');
            } catch (err) {
                console.error('Mic error:', err);
                if (err.name === 'NotAllowedError') {
                    alert('Доступ к микрофону запрещён. Разрешите в настройках браузера.');
                } else {
                    alert('Не удалось начать запись: ' + err.message);
                }
            }
        }

        function stopRecording() {
            if (!mediaRec || mediaRec.state === 'inactive') return;
            mediaRec.stop();
            mic.classList.remove('recording');
        }

        // Mouse events
        mic.addEventListener('mousedown', startRecording);
        mic.addEventListener('mouseup', stopRecording);
        mic.addEventListener('mouseleave', stopRecording);

        // Touch events (mobile)
        mic.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        mic.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
        mic.addEventListener('touchcancel', (e) => { e.preventDefault(); stopRecording(); });


        function toggleCall(show) {
            document.getElementById('view-call').style.display = show ? 'flex' : 'none';
        }

        document.getElementById('msg-in').onkeydown = e => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
